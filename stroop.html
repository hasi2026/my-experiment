<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストループ課題実験 (Stroop Task)</title>
    <!-- jsPsych 7.3系のCDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    
    <style>
        body {
            background-color: #FFFFFF; /* 背景色: 白 */
            color: #000000;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            /* 画面中央に配置するための設定 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* jsPsychのコンテナを画面いっぱいに広げる */
        #jspsych-target {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 教示用テキストのスタイル（24px） */
        .instruction-text {
            font-size: 24px;
            line-height: 1.8;
            text-align: center; /* 中央揃えに変更して視認性を向上 */
            max-width: 90%;
            margin: 0 auto;
            word-break: keep-all; /* 単語の途中で改行させない */
        }

        /* 刺激（文字）のスタイル（60px） */
        .stimulus-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px; /* 文字が切れないよう高さを確保 */
        }

        .stimulus-text {
            font-size: 60px;
            font-weight: bold;
            display: block;
        }

        /* 注視点（+）のスタイル（60px） */
        .fixation {
            font-size: 60px;
            line-height: 1;
        }

        /* ボタンのスタイル調整 */
        .jspsych-btn {
            font-size: 20px !important;
            padding: 10px 30px !important;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        const jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function() {
                // 実験終了時にCSV形式でデータを表示
                jsPsych.data.displayData('csv');
            }
        });

        const timeline = [];

        // 実験開始ボタン（全画面化の代わりにボタンを使用）
        const start_screen = {
            type: jsPsychHtmlButtonResponse,
            stimulus: `
                <div class="instruction-text">
                    <p>ストループ課題実験を開始します。</p>
                </div>
            `,
            choices: ['実験を開始する'],
            post_trial_gap: 500
        };
        timeline.push(start_screen);

        // 教示画面
        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction-text">
                    <p>画面に表示される文字の<strong>「色」</strong>をできるだけ早く正確に答えてください。</p>
                    <div style="margin: 20px 0; border: 1px solid #ccc; padding: 20px; border-radius: 10px;">
                        <p>・赤色の文字なら <strong style="color:red;">'r'</strong> キー</p>
                        <p>・青色の文字なら <strong style="color:blue;">'b'</strong> キー</p>
                        <p>・緑色の文字なら <strong style="color:green;">'g'</strong> キー</p>
                    </div>
                    <p>準備ができたら<strong>スペースキー</strong>を押して開始します。</p>
                </div>
            `,
            choices: [' '],
            post_trial_gap: 1000
        };
        timeline.push(instructions);

        const stroop_stimuli = [
            // 一致条件 (Congruent)
            { word: "赤", color: "red", condition: "congruent", correct_response: "r" },
            { word: "青", color: "blue", condition: "congruent", correct_response: "b" },
            { word: "緑", color: "green", condition: "congruent", correct_response: "g" },
            // 不一致条件 (Incongruent)
            { word: "赤", color: "blue", condition: "incongruent", correct_response: "b" },
            { word: "赤", color: "green", condition: "incongruent", correct_response: "g" },
            { word: "青", color: "red", condition: "incongruent", correct_response: "r" },
            { word: "青", color: "green", condition: "incongruent", correct_response: "g" },
            { word: "緑", color: "red", condition: "incongruent", correct_response: "r" },
            { word: "緑", color: "blue", condition: "incongruent", correct_response: "b" }
        ];

        // 1. 注視点 (+) 500ms
        const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="fixation">+</div>',
            choices: "NO_KEYS",
            trial_duration: 500,
            data: { task: 'fixation' }
        };

        // 2. 刺激提示（キー入力があるまで無限に表示）
        const stimulus_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function() {
                const word = jsPsych.timelineVariable('word');
                const color = jsPsych.timelineVariable('color');
                return `
                    <div class="stimulus-container">
                        <div class="stimulus-text" style="color: ${color};">${word}</div>
                    </div>`;
            },
            choices: ['r', 'b', 'g'],
            data: {
                task: 'response',
                word: jsPsych.timelineVariable('word'),
                color: jsPsych.timelineVariable('color'),
                condition: jsPsych.timelineVariable('condition'),
                correct_response: jsPsych.timelineVariable('correct_response')
            },
            on_finish: function(data) {
                // 正誤判定
                data.correct = (data.response == data.correct_response);
            }
        };

        // 3. 試行間隔 (ITI) 1000ms
        const iti = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '',
            choices: "NO_KEYS",
            trial_duration: 1000,
            data: { task: 'iti' }
        };

        const test_procedure = {
            timeline: [fixation, stimulus_trial, iti],
            timeline_variables: stroop_stimuli,
            sample: {
                type: 'with-replacement', // 復元抽出
                size: 10                  // 合計10試行
            }
        };
        timeline.push(test_procedure);

        // 実行
        jsPsych.run(timeline);
    </script>
</body>
</html>
